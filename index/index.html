<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Blog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff8dc;
            margin: 20px;
        }

        h2 {
            color: #8a6d1d;
        }

        form {
            background-color: #fff3b0;
            padding: 15px;
            border-radius: 8px;
            width: 300px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #e0c97f;
            border-radius: 5px;
        }

        button {
            background-color: #f4c430;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e6b800;
        }

        #test div {
            background-color: #fff9db;
            border: 1px solid #e0c97f;
            border-radius: 8px;
        }
    </style>
</head>

<body onload="Bulletin_Board()">

<h2>Crear Post</h2>

<form onsubmit="crearPost(event)">
    <input type="text" id="title" placeholder="Título" required><br><br>
    <textarea id="body" placeholder="Contenido" required></textarea><br><br>
    <button type="submit">publicar</button>
</form>

<hr>

<div id="test"></div>

<script>

    function crearPost(event) {
        event.preventDefault();

        const title = document.getElementById('title').value;
        const body = document.getElementById('body').value;

        fetch('https://dummyjson.com/posts/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                title: title,
                body: body,
                userId: 1
            })
        })
            .then(res => res.json())
            .then(data => {
                alert("post creado");

                document.getElementById('title').value = "";
                document.getElementById('body').value = "";

                Bulletin_Board();
            })
            .catch(error => {
                alert("error al crear post");
                console.error(error);
            });
    }

    function Bulletin_Board() {
        const container = document.getElementById('test');

        container.innerHTML = "<p>cargando</p>";

        fetch('https://dummyjson.com/posts')
            .then(res => res.json())
            .then(data => {
                const posts = data.posts;

                if (posts.length === 0) {
                    container.innerHTML = "<p>no hay posts</p>";
                    return;
                }

                let html = "";

                posts.forEach(post => {
                    html += `
                    <div style="border:1px solid #ccc; margin:10px; padding:10px;">
                        <h3>${post.title}</h3>
                        <p>${post.body}</p>
                    </div>
                `;
                });

                container.innerHTML = html;
            })
            .catch(error => {
                container.innerHTML = `
                <p>Error al cargar</p>
                <button onclick="Bulletin_Board()">reintentar?</button>
            `;
                console.error(error);
            });
    }

</script>

</body>
</html>
